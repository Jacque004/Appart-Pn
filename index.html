<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/placeholder-logo.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AppartPN - Location de logements à Pointe-Noire</title>
    <meta
      name="description"
      content="Trouvez votre logement idéal à Pointe-Noire : villas, appartements, studios."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
      rel="stylesheet"
    />
    <script>
      (function () {
        try {
          var k = "appartpn-theme";
          var t = localStorage.getItem(k);
          if (t === "dark") document.documentElement.classList.add("dark");
          else if (t === "light") document.documentElement.classList.remove("dark");
          else if (window.matchMedia("(prefers-color-scheme: dark)").matches) document.documentElement.classList.add("dark");
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
